{% extends "base.html" %}{% block title %}總覽 — IT Console V2+{% endblock %}{% block content %}<div class="v2c-toolbar"><div><h1 class="v2c-page-title">總覽儀表板</h1><p class="v2c-page-subtitle">目前 Tenant：{{ nav_tenant.display_name }}；僅顯示你有權限檢視的模組統計。</p></div></div>{% if kpis %}<div class="v2c-kpi-grid">{% for k in kpis %}<div class="v2c-kpi-card"><div class="v2c-kpi-label">{{ k.label }}</div><div class="v2c-kpi-value">{{ k.value }}</div></div>{% endfor %}</div>{% else %}<p class="v2c-kpi-empty">你目前沒有任何可檢視的模組。</p>{% endif %}{% endblock %}
